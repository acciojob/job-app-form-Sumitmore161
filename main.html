<!DOCTYPE html>

<html>

<head>
	<link rel="stylesheet" href="styles.css">
</head>

<body>
	<!-- the entire body must be written by student -->
	<form method="post">
		<label for="name">Name</label>
		<input name="Name" type="text" id="name" required>
		<br><br>
		<label for="email">Email</label>
		<input name="Email" type="email" id="email" required>
		<br><br>
		<label for="male">Male</label>
		<input name="gender" type="radio" value="male" id="male" required>
		<br><br>
		<label for="female">Female</label>
		<input name="gender" type="radio" value="female" id="female" required>
		<br><br>
		<label for="laptop">Laptop Brands</label>
		<select id="laptop">
			<option>Apple</option>
			<option>Asus</option>
			<option>HP</option>
		</select>
		<br><br>
		<label for="age">Age:</label>
		<input name="age" type="number" id="age" required>
		<br><br>
		<label for="dob">Date of Birth:</label>
		<input name="dob" type="date" id="dob" required>
		<br><br>
		<label for="password">Password:</label>
		<input name="password" type="password" id="password" required>
		<br><br>
		<label for="portfolio">Portfolio URL:</label>
		<input name="portfolio_url" type="url" id="portfolio" required>
		<br><br>
		<button type="submit">Submit</button>
	</form>
    <script type="text/javascript" src="./script.js">
</script>

</body>

</html>
